<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="保育室を舞台にした無料ゲーム。スマホ＆PC対応。" />
    <link rel="icon" href="favicon.ico" />
    <title>忘れられた保育室からの脱出</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #2c1810, #1a0f08);
        color: #f4f1e8;
        width: 100%;
        overflow-x: hidden;
        /* ←これ重要 */
      }

      .game-container {
        width: 100%;
        max-width: 1408px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      #gameCanvas {
        position: relative;
      }

      #endingShareArea {
        position: absolute;
        left: 50%;
        bottom: 32px;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.96);
        border-radius: 18px;
        box-shadow: 0 0 24px #fffc;
        padding: 18px 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 99;
        font-size: 1.2em;
        gap: 10px;
        border: 2px solid gold;
      }

      #endingShareArea button {
        font-size: 1.1em;
        padding: 10px 24px;
        margin: 6px 0;
        background: gold;
        color: #333;
        border-radius: 8px;
        border: none;
        font-weight: bold;
        box-shadow: 0 2px 8px #ffdc;
        cursor: pointer;
      }

      .ui-panel {
        flex-wrap: wrap;
        width: 100%;
        max-width: 1048px;
        min-height: 120px;
        background: #2c1810;
        box-sizing: border-box;
        display: flex;
      }

      .inventory {
        /* flex: 1; */
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
        padding: 0 12px;
        /* width:100%; */
      }

      .inventory-slot {
        width: 14vw;
        height: 14vw;
        max-width: 80px;
        max-height: 80px;
        border: 2px solid #d4af37;
        background: rgba(212, 175, 55, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
      }

      .inventory-slot:hover {
        background: rgba(212, 175, 55, 0.2);
        transform: scale(1.05);
      }

      .inventory-slot.selected {
        border: 3px solid #9f2b02;
        /* 金色・太め推奨 */
        box-shadow: 0 0 12px #ff8c0099;
        background: rgba(255, 215, 0, 0.15);
      }

      .inventory-slot img {
        max-width: 60px;
        max-height: 60px;
        object-fit: contain;
      }

      .magnifier-btn {
        position: absolute;
        right: 4px;
        bottom: 4px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #d4af37;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px #0002;
        cursor: pointer;
        z-index: 10;
        transition: box-shadow 0.15s;
      }

      .magnifier-btn:hover {
        box-shadow: 0 0 10px #ffd70099;
      }

      .magnifier-btn img {
        width: 16px;
        height: 16px;
        pointer-events: none;
      }

      .info-panel {
        width: 100%;
        padding: 2px;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .message-area {
        background: rgba(0, 0, 0, 0.8);
        padding: 5px;
        border-radius: 5px;
        margin-bottom: 2px;
        height: 65px;
        min-height: 40px;
        border: 1px solid #d4af37;
        position: relative;
      }

      #msgText {
      }

      #statusIconArea {
        position: absolute;
        bottom: 6px;
        right: 12px;
        display: flex;
        gap: 8px;
        z-index: 5;
      }

      .status-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 2px solid gold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px #0005;
        font-size: 1.4em;
      }

      .navigation {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .nav-btn {
        padding: 8px 16px;
        background: linear-gradient(135deg, #d4af37, #b8941f);
        border: none;
        border-radius: 5px;
        color: #1a0f08;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .nav-btn:hover {
        background: linear-gradient(135deg, #b8941f, #d4af37);
        transform: translateY(-2px);
      }

      .nav-btn:disabled {
        background: #666;
        cursor: not-allowed;
        transform: none;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-content {
        background: linear-gradient(135deg, #2c1810, #1a0f08);
        padding: 30px;
        border-radius: 10px;
        border: 3px solid #d4af37;
        /*  max-width: calc(100vw - 60px); */
        text-align: center;
        max-width: min(96vw, 640px);
        max-height: calc(100vh - 64px);
        /* 画面に収める */
        overflow: auto;
        /* はみ出したらスクロール */
        padding: 20px;
        /* ちょい圧縮 */
      }

      .modal button {
        margin: 10px;
        padding: 10px 20px;
        background: #d4af37;
        border: none;
        border-radius: 5px;
        color: #1a0f08;
        cursor: pointer;
        font-weight: bold;
      }

      #modalButtons button {
        border: none;
        background: none;
        padding: 0;
        margin: 0 10px 10px 0;
        cursor: pointer;
        transition:
          filter 0.1s,
          box-shadow 0.1s,
          transform 0.08s;
        border-radius: 10px;
      }

      #modalButtons button img {
        width: 80px;
        height: 80px;
        vertical-align: middle;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        transition:
          filter 0.1s,
          box-shadow 0.1s,
          transform 0.08s;
      }

      #modalButtons button:hover img {
        filter: brightness(1.08) drop-shadow(0 2px 6px #ffd70050);
        box-shadow: 0 0 10px #ffd70080;
        transform: scale(1.05);
      }

      #modalButtons button:active img,
      #modalButtons button.pressed img {
        filter: brightness(0.95) grayscale(20%);
        box-shadow: 0 0 8px #3332;
        transform: scale(0.97);
      }

      #modalButtons button:disabled img {
        filter: grayscale(90%) opacity(0.5);
        box-shadow: none;
      }

      /* テキスト型ボタンも画像ボタン風に */
      #modalButtons button.text-btn {
        min-width: 120px;
        font-size: 1.15em;
        background: linear-gradient(90deg, #ffe259 0%, #ffa751 100%);
        color: #7b4a00;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        padding: 15px 32px;
        margin: 0 10px 10px 0;
        box-shadow: 0 4px 14px #ffc90022;
        cursor: pointer;
        transition:
          background 0.12s,
          filter 0.1s,
          box-shadow 0.1s,
          transform 0.08s;
        vertical-align: middle;
        display: inline-block;
      }

      #modalButtons button.text-btn:hover {
        background: linear-gradient(90deg, #ffea85 0%, #ffc371 100%);
        filter: brightness(1.08);
        box-shadow: 0 6px 20px #ffc90055;
        transform: scale(1.05);
      }

      #modalButtons button.text-btn:active {
        filter: brightness(0.96);
        transform: scale(0.97);
      }

      #modalButtons button.text-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* 閉じるボタン */
      #modalClose .modal-close-btn {
        display: inline-block;
        min-width: 160px;
        font-size: 1.2em;
        background: linear-gradient(90deg, #ffe259 0%, #ffa751 100%);
        color: #7b4a00;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        padding: 15px 32px;
        box-shadow: 0 4px 14px #ffc90022;
        margin-top: 10px;
        cursor: pointer;
        transition:
          background 0.12s,
          filter 0.1s,
          box-shadow 0.1s;
      }

      #modalClose .modal-close-btn:hover {
        background: linear-gradient(90deg, #ffea85 0%, #ffc371 100%);
        filter: brightness(1.08);
        box-shadow: 0 6px 20px #ffc90055;
      }

      .modal button.ok-btn {
        margin-top: 8px;
        font-size: 1.4rem;
        background-color: #1d9fff;
        color: #fff;
      }

      .modal button.ok-btn:hover {
        background-color: #1789da;
      }

      .puzzle-input {
        width: 200px;
        padding: 10px;
        margin: 10px;
        border: 2px solid #d4af37;
        background: rgba(244, 241, 232, 0.9);
        color: #1a0f08;
        border-radius: 5px;
        text-align: center;
        font-size: 16px;
      }

      .title {
        position: absolute;
        top: 0px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        padding: 2px 8px;
        border: 2px solid #d4af37;
        border-radius: 25px;
        font-size: 12px;
        font-weight: bold;
        z-index: 100;
      }

      .login-container {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 10px;
        color: #fff;
        width: 280px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        font-family: "Segoe UI", sans-serif;
      }

      .login-title {
        text-align: center;
        margin-bottom: 15px;
      }

      .login-form label {
        font-size: 14px;
        margin-top: 8px;
        display: block;
      }

      .login-buttons {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
      }

      .login-btn {
        background: #4caf50;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      .cancel-btn {
        background: #f44336;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      /* 画像プレースホルダー用のスタイル */
      .image-placeholder {
        background: linear-gradient(135deg, #444, #666);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ccc;
        font-size: 14px;
        text-align: center;
        border-radius: 5px;
      }

      .notice {
        text-overflow: clip;
      }

      .save-area {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin: 18px 0 4px 0;
        /* width: 40%; */
      }

      @media (max-width: 600px) {
        #msgText {
          font-size: 0.8rem;
        }

        .save-area {
          width: 100%;
          max-width: 100%;
          margin-left: 0;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          margin-top: 8px;
          gap: 16px;
        }

        .inventory {
          gap: 16px;
          align-items: center;
          padding: 0 2px;
          width: 100%;
        }
      }

      .save-area .nav-btn {
        min-width: 80px;
        padding: 10px 18px;
        font-size: 15px;
        background: linear-gradient(135deg, #d4af37 85%, #b8941f 100%);
        border-radius: 8px;
        border: none;
        color: #1a0f08;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(212, 175, 55, 0.1);
        transition:
          background 0.3s,
          transform 0.2s;
      }

      .save-area .nav-btn:hover {
        background: linear-gradient(135deg, #b8941f 70%, #d4af37 100%);
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 0 12px #d4af3740;
      }

      #roomEffectOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: white;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s;
        z-index: 9999;
      }

      .title-wrapper {
        display: flex;
        width: 100%;
      }

      @keyframes warpFlash {
        0% {
          opacity: 0;
        }

        15% {
          opacity: 0.95;
        }

        50% {
          opacity: 0.4;
        }

        100% {
          opacity: 0;
        }
      }

      @keyframes chroma {
        0% {
          filter: none;
        }

        100% {
          filter: contrast(1.2) saturate(1.2) hue-rotate(20deg);
        }
      }

      .warp-active {
        background: radial-gradient(circle at 50% 50%, #fff, #000 70%);
        animation:
          warpFlash 900ms ease-out both,
          chroma 900ms ease-out both;
      }

      #hintModal {
        color: #000;
      }

      @keyframes glowPulse {
        0% {
          opacity: 0;
        }

        20% {
          opacity: 1;
        }

        60% {
          opacity: 0.9;
        }

        100% {
          opacity: 0;
        }

        /* 自動でフェードアウト */
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.45);
        }

        50% {
          box-shadow: 0 0 18px 6px rgba(255, 255, 255, 0.35);
        }
      }

      /* 画面フラッシュ用の全画面レイヤ */
      #fxFlash {
        position: fixed;
        inset: 0;
        background: transparent;
        pointer-events: none;
        opacity: 0;
        z-index: 9999;
      }

      /* 白フラッシュ */
      @keyframes flashWhite {
        0% {
          opacity: 0;
          background: #fff;
        }

        12% {
          opacity: 0.95;
          background: #fff;
        }

        100% {
          opacity: 0;
          background: #fff;
        }
      }

      /* 赤フラッシュ（ミス） */
      @keyframes flashRed {
        0% {
          opacity: 0;
          background: rgba(255, 0, 0, 0);
        }

        18% {
          opacity: 0.85;
          background: rgba(255, 0, 0, 0.85);
        }

        100% {
          opacity: 0;
          background: rgba(255, 0, 0, 0);
        }
      }

      /* ほんの少しカメラシェイク（好みで） */
      @keyframes camShake {
        0% {
          transform: translate(0, 0);
        }

        25% {
          transform: translate(1px, -1px);
        }

        50% {
          transform: translate(-1px, 1px);
        }

        75% {
          transform: translate(1px, 1px);
        }

        100% {
          transform: translate(0, 0);
        }
      }

      .fx-shake {
        animation: camShake 120ms ease;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      .casefile-modal {
        background-color: #f6f2e8;
        color: #2c2c2c;
        width: 80%;
        max-width: 720px;
        max-height: 85vh;
        border: 2px solid #bba;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        border-radius: 4px;
      }

      .casefile-scroll {
        padding: 24px;
        overflow-y: auto;
        max-height: 80vh;
        font-family: "Noto Serif JP", "Times New Roman", serif;
        line-height: 1.6;
      }

      .casefile-modal h1,
      .casefile-modal h2 {
        text-align: center;
        margin-bottom: 8px;
      }

      .casefile-modal h3 {
        margin-top: 20px;
        border-bottom: 1px solid #999;
      }

      .person {
        margin: 12px 0;
        padding: 10px;
        background: rgba(255, 255, 255, 0.6);
        border-left: 3px solid #b44;
      }

      .initial-f {
        font-weight: 900;
        color: #c9a43d;
        /* gold */
        font-size: 1.55em;
        /* margin-left: 6px; */
      }

      .initial-l {
        font-weight: 900;
        color: #8c8fa1;
        /* silver/steel */
        font-size: 1.55em;
        /* margin-left: 4px; */
      }

      .evidence {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9em;
      }

      .evidence th,
      .evidence td {
        border: 1px solid #bbb;
        padding: 6px 8px;
      }

      /* 電話図鑑用の行ハイライト */
      .evidence tr.phone-discovered td {
        background: rgba(255, 248, 210, 0.9);
        /* うすいクリーム色 */
        font-weight: 600;
      }

      .evidence tr.phone-undiscovered td {
        background: rgba(245, 245, 245, 0.7);
        /* うすグレー */
        color: #777;
      }

      blockquote {
        font-style: italic;
        color: #444;
        border-left: 4px solid #888;
        padding-left: 10px;
        margin: 10px 0;
      }

      .close-btn {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 1.4rem;
        background: none;
        border: none;
        color: #333;
        cursor: pointer;
      }

      .group {
        width: 90%;
        justify-content: center;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      @keyframes breathe {
        0% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(2px);
        }

        100% {
          transform: translateY(0);
        }
      }

      /* モーダルの画像ボタンは固定80px→可変に */
      #modalButtons button img {
        width: clamp(56px, 18vw, 96px);
        height: clamp(56px, 18vw, 96px);
      }

      /* アニメモーダル用 */
      .modal-anim {
        position: relative;
        width: min(400px, 80vw);
        margin: 0 auto 16px;
      }

      .modal-anim img {
        display: block;
        width: 100%;
        pointer-events: none;
      }

      /* 1枚目はだんだん消える */
      .modal-anim img:nth-child(1) {
        position: absolute;
        inset: 0;
        opacity: 1;
        animation: blockmanHatFadeOut 2.8s ease forwards 0.1s;
      }

      /* 2枚目は後からふわっと出てくる */
      .modal-anim img:nth-child(2) {
        opacity: 0;
        animation: blockmanHatFadeIn 3s ease forwards 0.4s;
      }

      /* 1枚あたり1秒表示の例 */
      .modal-anim.frames img:nth-child(1) {
        animation-delay: 0s;
      }

      .modal-anim.frames img:nth-child(2) {
        animation-delay: 1s;
      }

      .modal-anim.frames img:nth-child(3) {
        animation-delay: 2s;
      }

      .modal-anim.frames img:nth-child(4) {
        animation-delay: 3s;
      }

      .modal-anim.frames img:nth-child(5) {
        animation-delay: 4s;
      }

      .modal-anim.frames img:nth-child(6) {
        animation-delay: 5s;
      }

      .modal-anim.frames img:nth-child(7) {
        animation-delay: 6s;
      }

      .modal-anim.frames img:nth-child(8) {
        animation-delay: 7s;
      }

      .modal-anim.frames img {
        position: absolute;
        inset: 0;
        width: 100%;
        opacity: 0;
        pointer-events: none;
        animation: animFrame 8s linear forwards;
      }

      @keyframes animFrame {
        0% {
          opacity: 0;
        }

        10% {
          opacity: 1;
        }

        90% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }

      /* 1枚目はだんだん消える */
      .fast img:nth-child(1) {
        animation: blockmanHatFadeOut 1.2s ease forwards 0.1s;
      }

      /* 2枚目は後からふわっと出てくる */
      .fast img:nth-child(2) {
        animation: blockmanHatFadeIn 1.4s ease forwards 0.4s;
      }

      @keyframes blockmanHatFadeOut {
        to {
          opacity: 0;
        }
      }

      @keyframes blockmanHatFadeIn {
        to {
          opacity: 1;
        }
      }

      /* ▼ クルー手帳モーダル用 */

      .notebook-modal-content {
        background: #f4f7fb;
        color: #2c1810;
        border: 3px solid #d4af37;
        max-width: min(96vw, 640px);
        max-height: calc(100vh - 64px);
        overflow: auto;
        padding: 18px 18px 20px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        position: relative;
      }

      .notebook-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .notebook-title {
        font-weight: bold;
        font-size: 1.1rem;
        letter-spacing: 0.08em;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .notebook-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid #c9a43d;
        font-size: 1.1rem;
        background: linear-gradient(135deg, #eaf3ff, #d6e4ff);
      }

      .notebook-close-btn {
        border: none;
        background: transparent;
        font-size: 1.4rem;
        cursor: pointer;
        color: #555;
      }

      .notebook-close-btn:hover {
        color: #000;
      }

      .notebook-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }

      .notebook-tab {
        flex: 1;
        border: 1px solid #c9a43d;
        background: #fdfaf0;
        padding: 6px 4px;
        font-size: 0.8rem;

      // 足音で数歩→ワープ演出→目的の部屋へ
      function travelWithSteps(destRoom = "end", color = "#000") {
        const canvasEl = document.getElementById("gameCanvas");
        const overlay = document.getElementById("roomEffectOverlay");

        // 足音を鳴らす
        try {
          const se = document.getElementById("se-ashioto");
          if (se) {
            se.currentTime = 0;
            se.play();
          }
        } catch (e) {}

        // 画面を黒フェードに
        if (overlay) {
          overlay.style.background = color; // 黒スクリーン
          overlay.style.opacity = 1; // しっかり黒
        }

        let step = 0;
        const stepTimer = setInterval(() => {
          step++;

          if (step >= 3) {
            clearInterval(stepTimer);

            if (overlay) {
              changeRoom(destRoom);
            }

            setTimeout(() => {
              // 演出後に綺麗に消す
              if (overlay) {
                // overlay.style.background = '';
                overlay.style.opacity = 0;
              }
            }, 100);
          }
        }, 160);
      }

      function travelWithStepsTrueEnd() {
        const overlay = document.getElementById("roomEffectOverlay");
        let destRoom = "trueEnd";
        if (gameState.main.flags.watchOutside) {
          gameState.trueEnd.flags.backgroundState++;
        }

        // 足音を鳴らす
        try {
          const se = document.getElementById("se-ashioto");
          if (se) {
            se.currentTime = 0;
            se.play();
          }
        } catch (e) {}

        // 画面を黒フェードに
        if (overlay) {
          overlay.style.background = "#fff";
          overlay.style.opacity = 1;
        }

        let step = 0;
        const stepTimer = setInterval(() => {
          step++;

          if (step >= 3) {

            if (overlay) {
              overlay.classList.add("warp-active");

      function initGame() {

      function findHitArea(x, y, clickableAreas, canvas) {
        // zIndex降順で
        const sorted = clickableAreas.slice().sort((a, b) => (b.zIndex || 0) - (a.zIndex || 0));
        for (const area of sorted) {
          // 必要ならusable判定もここで
          const usable = area.usable === undefined ? true : typeof area.usable === "function" ? area.usable() : area.usable;

          if (!usable) continue; // 使えないエリアは判定しない
          const ax = (area.x / 100) * canvas.width;
          const ay = (area.y / 100) * canvas.height;
          const aw = (area.width / 100) * canvas.width;
          const ah = (area.height / 100) * canvas.height;
          if (x >= ax && x <= ax + aw && y >= ay && y <= ay + ah) {
            return area; // 最初にヒットしたものだけ返す！
          }
        }
        return null;
      }

      let hoveredAreaIndex = null; // 今hoverしてるエリア（なければnull）
      canvas.addEventListener("mousemove", function (e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        const room = rooms[gameState.currentRoom];
        const area = findHitArea(x, y, room.clickableAreas, canvas);
        const idx = area ? room.clickableAreas.indexOf(area) : null;
        if (hoveredAreaIndex !== idx) {
          hoveredAreaIndex = idx;
          renderCanvasRoom();
        }
      });

      canvas.addEventListener("mouseout", function () {
        if (hoveredAreaIndex !== null) {
          hoveredAreaIndex = null;
          renderCanvasRoom();
        }
      });

      canvas.addEventListener("click", function (e) {
        // 入力ロック中はクリック無効（演出中など）
        if (gameState.fx && gameState.fx.lockInput) return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        // ★今いる部屋のエリアだけ判定！
        const room = rooms[gameState.currentRoom];
        const area = findHitArea(x, y, room.clickableAreas, canvas);

        // if (area) {
        //     handleAreaClick(area.action, e);
        // }
        if (area) {
          if (typeof area.onClick === "function") {
            area.onClick(e);
            playSE("se-click");
          } else if (area.action) {
            handleAreaClick(area.action, e); // 互換のために残してもOK
          }
        }
      });

      const END_IDS = new Set(["end", "trueEnd", "trueEnd2"]);

      // ===== changeRoom フック：=====
      const _changeRoom_custom = changeRoom;
      changeRoom = function (roomId) {
        _changeRoom_custom.apply(this, arguments);

        if (END_IDS.has(roomId)) {
          const elapsed = Math.round((Date.now() - ANA.start) / 1000);
          ANA.endTimes = ANA.endTimes || {};
          if (!ANA.endTimes[roomId]) ANA.endTimes[roomId] = elapsed;

          const isTrue = roomId === "trueEnd";
          ANA.send("ending_reached", {
            ending_id: roomId,
            is_true: isTrue,
            elapsed_sec: elapsed,
            hints: ANA.hintCount,
          });
          // setTimeout(() => showFeedbackModal(roomId), 1500);
        }

      function renderCanvasRoom() {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const roomId = gameState.currentRoom;
        const room = rooms[roomId];
        const bgImgSrc = getRoomBackgroundImage(roomId, gameState);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景描画
        const bgImg = loadedImages[bgImgSrc];
        if (bgImg && bgImg.complete) {
          ctx.save();
          const phase = gameState.main?.flags?.timePhase ?? 0;
          const isNight = phase === 2;
          if (isNight) {
            ctx.filter = "saturate(0.3) brightness(0.6)"; // 背景はちょい暗め
          } else {
            ctx.filter = "none";
          }
          ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
          ctx.restore();
        }

        // アイテム描画（未取得のみ）
        drawRoomItems(ctx, canvas, roomId);

        // ★ ここから重なり優先のhover枠線を描画
        if (hoveredAreaIndex !== null && hoveredAreaIndex !== undefined) {
          // zIndex降順でソート
          const sortedAreas = room.clickableAreas
            .map((area, i) => ({ ...area, __idx: i }))
            .filter((area) => (area.usable === undefined ? true : typeof area.usable === "function" ? area.usable() : area.usable))
            .sort((a, b) => (b.zIndex || 0) - (a.zIndex || 0));
          // hoveredAreaIndexと一致するエリアをzIndex順で1つだけ枠描画
          const hoverArea = sortedAreas.find((area) => area.__idx === hoveredAreaIndex);
          if (hoverArea) {
            const ax = (hoverArea.x / 100) * canvas.width;
            const ay = (hoverArea.y / 100) * canvas.height;
            const aw = (hoverArea.width / 100) * canvas.width;
            const ah = (hoverArea.height / 100) * canvas.height;
            ctx.save();
            ctx.strokeStyle = "gold";
            ctx.lineWidth = 2;
            ctx.strokeRect(ax, ay, aw, ah);
            ctx.restore();
          }
        }

        if (DEV_MODE) {
          ctx.save();
          ctx.lineWidth = 2;

          room.clickableAreas.forEach((a) => {
            ctx.strokeStyle = "rgba(255,0,0,0.8)";
            ctx.fillStyle = "rgba(255,0,0,0.35)";
            ctx.font = "14px sans-serif";
            const px = (a.x / 100) * canvas.width;
            const py = (a.y / 100) * canvas.height;
            const pw = (a.width / 100) * canvas.width;
            const ph = (a.height / 100) * canvas.height;

            // 半透明の枠
            ctx.fillRect(px, py, pw, ph);
            ctx.strokeRect(px, py, pw, ph);

            // description 表示
            if (a.description) {
              ctx.fillStyle = "rgba(0,0,0,0.7)";
              ctx.fillRect(px, py - 18, ctx.measureText(a.description).width + 8, 18);

              ctx.fillStyle = "white";
              ctx.fillText(a.description, px + 4, py - 4);
            }
          });

          ctx.restore();
        }
      }

      function drawRoomItems(ctx, canvas, roomId) {
        const room = rooms[roomId];
        const fx = gameState.fx || {};
        const km = fx.kaniMove;
        const isKaniMoving = !!(km && km.active && km.roomId === roomId);

        // 通常のアイテム（演出中のカニだけスキップ）
        room.clickableAreas.forEach((area) => {
          if (area.item && area.item.visible && area.item.visible()) {
            const key = typeof area.item.img === "function" ? area.item.img() : area.item.img;

            // カニ移動演出中は、エリアに紐づいたカニ描画を止める（自前で動かす）
            if (isKaniMoving && key === "kani") return;

            const img = loadedImages[IMAGES.items[key]];
            if (img && img.complete && img.naturalWidth > 0) {
              const alpha = area.alpha ? area.alpha : 1;
              const px = (area.x / 100) * canvas.width;
              const py = (area.y / 100) * canvas.height;
              const w = (area.width / 100) * canvas.width;
              const h = (area.height / 100) * canvas.height;
              ctx.save();
              ctx.globalAlpha = alpha;

              // ★ 夜モードなら彩度＋明るさを落とす
              const phase = gameState.main?.flags?.timePhase ?? 0;
              const isNight = phase === 2;
              if (isNight) {
                // 値は好みで調整
                ctx.filter = "saturate(0.4) brightness(0.8)";
              } else {
                ctx.filter = "none";
              }

              ctx.drawImage(img, px, py, w, h);
              ctx.restore();
            }
          }
        });

        // ===== カニ移動演出（canvas上で実際に動かす） =====
        if (isKaniMoving) {
          const now = typeof performance !== "undefined" ? performance.now() : Date.now();
          const p = Math.max(0, Math.min(1, (now - km.start) / km.duration));
          const e = easeOutCubic(p);

          const x = km.from.x + (km.to.x - km.from.x) * e;
          const y = km.from.y + (km.to.y - km.from.y) * e;
          const w = km.from.w + (km.to.w - km.from.w) * e;
          const h = km.from.h + (km.to.h - km.from.h) * e;

          // const img = loadedImages[IMAGES.items['kani']];
          const spriteKey = km.spriteKey || "kani";
          const img = loadedImages[IMAGES.items[spriteKey]];
          if (img && img.complete && img.naturalWidth > 0) {
            ctx.save();

            const phase = gameState.main?.flags?.timePhase ?? 0;
            const isNight = phase === 2;
            if (isNight) {
              ctx.filter = "saturate(0.4) brightness(0.8)";
            } else {
              ctx.filter = "none";
            }

            ctx.drawImage(img, x, y, w, h);
            ctx.restore();
          }

          if (p < 1) {
            // 次フレーム
            requestAnimationFrame(() => {
              try {
                renderCanvasRoom();
              } catch (e) {}
            });
          } else if (!km.done) {
            km.done = true;
            const cb = km.onDone;

            // 演出終了：ロック解除＆後処理

        const room = rooms[roomId];

        if (!area) return null;
        return {
          x: (area.x / 100) * canvas.width,

          h: (area.height / 100) * canvas.height,

        if (!from || !to) return;

        gameState.fx = gameState.fx || {};

      // 小物ユーティリティ
      function pointInRect(x, y, r) {
        return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        if (typeof r === "number") r = { tl: r, tr: r, br: r, bl: r };
        ctx.beginPath();
        ctx.moveTo(x + r.tl, y);
        ctx.lineTo(x + w - r.tr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
        ctx.lineTo(x + w, y + h - r.br);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
        ctx.lineTo(x + r.bl, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
        ctx.lineTo(x, y + r.tl);
        ctx.quadraticCurveTo(x, y, x + r.tl, y);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

        const f = document.getElementById("fxFlash");

        f.style.animation = "none"; // 連打対策
        // 強制reflowでアニメ再適用
        // eslint-disable-next-line no-unused-expressions
        f.offsetHeight;
        const key = type === "red" ? "flashRed" : "flashWhite";
        f.style.animation = `${key} ${durMs}ms ease`;
        // ページ全体を極小シェイク
        document.documentElement.classList.add("fx-shake");
        setTimeout(() => document.documentElement.classList.remove("fx-shake"), 120);
      }

      function screenShake(el = document.documentElement, ms = 120, cls = "fx-shake") {
        if (!el) return;
        // 連打でも必ず発火させる
        el.classList.remove(cls);
        void el.offsetHeight; // reflow
        el.classList.add(cls);
        setTimeout(() => el.classList.remove(cls), ms);

      function useItem(slotIndex) {
        const clickedItem = gameState.inventory[slotIndex];
        if (!clickedItem) return;

        // -------------------------
        // 1) 「使用対象を選んでください」中なら、クリックされたアイテムを対象として判定
        //    ・別アイテムクリックでフラグ解除（成功/失敗どっちでも）
        //    ・失敗時は無音（メッセージも出さない）
        // -------------------------
        if (gameState.usingItem) {
          // 同じスロットを押したらキャンセル（メッセージは出しても出さなくてもOK）
          if (gameState.usingItem.slotIndex === slotIndex) {
            clearUsingItem(true);
            return;
          }

          const success = tryPutSaltOnYakisoba(clickedItem);

          // 成功でも失敗でも解除（仕様どおり）
          clearUsingItem(true);

          if (success) {
            updateMessage("焼きそばに塩を振った。");
            gameState.main.flags.useSaltToYakisoba = true;
            updateInventoryDisplay();
          }
          return;
        }

        // -------------------------
        // 2) 塩をクリックしたら「使用対象選択モード」へ
        // -------------------------
        if (clickedItem === "salt") {
          gameState.usingItem = { itemId: clickedItem, slotIndex };
          gameState.selectedItem = clickedItem;
          gameState.selectedItemSlot = slotIndex;
          updateMessage("使用対象を選んでください");
          updateInventoryDisplay();
          return;
        }

        // -------------------------
        // 3) それ以外は今まで通りの挙動（既存ロジック）
        // -------------------------

        // ★すでに選択中のスロットを再クリック → 解除
        if (gameState.selectedItemSlot === slotIndex) {
          gameState.selectedItem = null;
          gameState.selectedItemSlot = null;
          updateMessage("アイテム選択を解除しました。");
          updateInventoryDisplay();
          return;
        }

        // ★通常の選択
        gameState.selectedItem = clickedItem;
        gameState.selectedItemSlot = slotIndex;
        updateMessage("アイテムを選択した。");
        updateInventoryDisplay();
      }

      // モーダル表示
      function showModal(title, content, buttons, onSequenceSuccess, options) {
        options = options || {};
        let modalHtml = `<h3>${title}</h3><div>${content}</div>`;
        if (buttons && buttons.length > 0) {
          const columnStyle = options.columnButtons ? "display:flex; flex-direction:column; gap:12px; align-items:stretch;" : "text-align:center; display:flex; gap:10px; justify-content:center;";

          modalHtml += `<div id="modalButtons" style="${columnStyle}"></div>`;
          modalHtml += `<div id="modalClose" style="margin-top:25px;text-align:center;"></div>`;
        }
        document.getElementById("modalContent").innerHTML = modalHtml;
        document.getElementById("modal").style.display = "flex";

        if (!buttons || buttons.length === 0) return;

        let pressed = [];
        let heartCnt = 0;
        let checkCnt = 0;
        let houseCnt = 0;

        // 画像/通常ボタンとcloseボタンで分ける
        const modalButtons = document.getElementById("modalButtons");
        const modalClose = document.getElementById("modalClose");

        buttons.forEach((button, idx) => {
          // 閉じるボタンは下へ
          if (button.action === "close") {
            const btn = document.createElement("button");
            btn.textContent = button.text || "閉じる";
            btn.className = "modal-close-btn";
            btn.onclick = function () {
              closeModal();
              if (typeof onSequenceSuccess === "function") {
                onSequenceSuccess();
              }
            };
            modalClose.appendChild(btn);
          } else {
            const btn = document.createElement("button");
            btn.style.margin = "0 10px 10px 0";
            if (button.img) {
              btn.innerHTML = `<img src="${button.img}" alt="${button.text || ""}" style="width:80px;height:80px;vertical-align:middle;">`;
            } else {
              btn.textContent = button.text;
              btn.className = "text-btn";
            }
            btn.onclick = function () {
              if (button.action === "restart") {
                restartGame();
              } else if (typeof button.action === "function") {
                button.action();
              } else if (typeof button.action === "string") {
                closeModal();
                handleAreaClick(button.action);
              }
            };
            modalButtons.appendChild(btn);
          }
        });
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
        // 次のモーダルが登録されていれば表示
        if (window._nextModal) {
          // 登録内容は {title, content, buttons, after} オブジェクト
          let modal = window._nextModal;
          window._nextModal = null; // クリア

          if (typeof modal === "function") {
            try {
              modal();
            } catch (e) {}
            window.dispatchEvent(new Event("modal:closed"));
            return;
          }

          if (modal.before) modal.before();
          showModal(modal.title, modal.content, modal.buttons);
          if (modal.after) modal.after();
        }
        window.dispatchEvent(new Event("modal:closed"));
      }

          bgm.pause();
          isBGMPlaying = false;
          btn.textContent = "🔇 BGM";
        }
      }

      function changeBGM(newSrc) {
        const bgm = document.getElementById("bgm");
        // ファイル名のみで比較
        const current = bgm.src.split("/").pop();
        const next = newSrc.split("/").pop();
        if (current === next) return; // すでにそのBGMなら何もしない

        const isPlaying = isBGMPlaying;
        bgm.pause();
        bgm.src = newSrc;
        bgm.load();
        if (isPlaying) {
          bgm.play();
        }
      }

      function pauseBGM() {
        const bgm = document.getElementById("bgm");
        bgm.src = "";
        bgm.pause();
      }

      function playSE(id) {
        const se = document.getElementById(id);
        se.currentTime = 0;
        se.play();
      }
      function stopSE(id) {
        const se = document.getElementById(id);
        se.pause();
      }

      // どこかで最初に一度だけ呼ぶ
      let loadedImages = {};
      function preloadImages() {
        // 部屋画像
        Object.values(IMAGES.rooms).forEach((val) => {
          // ★追加：{jp:[...], en:[...]} 形式
          if (val && typeof val === "object" && !Array.isArray(val)) {
            ["jp", "en"].forEach((lang) => {
              const list = val[lang];
              if (Array.isArray(list)) {
                list.forEach((src) => {
                  if (!loadedImages[src]) {
                    const img = new Image();
                    img.onload = () => {
                      try {
                        renderCanvasRoom();
                      } catch (e) {}
                    };
                    img.src = src;
                    loadedImages[src] = img;
                  }
                });
              } else if (typeof list === "string") {
                if (!loadedImages[list]) {
                  const img = new Image();
                  img.onload = () => {
                    try {
                      renderCanvasRoom();
                    } catch (e) {}
                  };
                  img.src = list;
                  loadedImages[list] = img;
                }
              }
            });
            return; // ★このvalの処理は終わり
          }
          if (Array.isArray(val)) {
            val.forEach((src) => {
              if (!loadedImages[src]) {
                const img = new Image();
                img.onload = () => {
                  try {
                    renderCanvasRoom();
                  } catch (e) {}
                };
                img.src = src;
                loadedImages[src] = img;
              }
            });
          } else if (typeof val === "string") {
            if (!loadedImages[val]) {
              const img = new Image();
              img.onload = () => {
                try {
                  renderCanvasRoom();
                } catch (e) {}
              };
              img.src = val;
              loadedImages[val] = img;
            }
          }
        });
        // アイテム画像
        Object.values(IMAGES.items).forEach((src) => {
          if (!loadedImages[src]) {
            const img = new Image();
            img.onload = () => {
              try {
                renderCanvasRoom();
              } catch (e) {}
            };
            img.src = src;
            loadedImages[src] = img;
          }
        });
        // モーダル画像
        Object.values(IMAGES.modals).forEach((src) => {
          if (!loadedImages[src]) {
            const img = new Image();
            img.onload = () => {
              try {
                renderCanvasRoom();
              } catch (e) {}
            };
            img.src = src;
            loadedImages[src] = img;
          }
        });
      }

      // save&load
      function saveGameToSlot(slotIndex) {
        const toSave = { ...gameState, __version: SAVE_VERSION };

        const payload = {
          data: toSave,
          savedAt: Date.now(),
        };

        localStorage.setItem(SAVE_KEYS[slotIndex], JSON.stringify(payload));
        updateMessage(`セーブ${slotIndex + 1}に保存しました！`);
      }

      function loadGameFromSlot(slotIndex) {
        const raw = localStorage.getItem(SAVE_KEYS[slotIndex]);
        if (!raw) {
          updateMessage(`セーブ${slotIndex + 1}のデータがありません`);
          return;
        }

        let saved;
        try {
          const parsed = JSON.parse(raw);
          // 新形式：{ data: {...}, savedAt: ... }
          if (parsed && parsed.data) {
            saved = parsed.data;
          } else {
            // 旧形式：そのまま gameState が入っている
            saved = parsed;
          }
        } catch (e) {
          console.error(e);
          updateMessage("セーブデータの読み込みに失敗しました");
          return;
        }

        const def = getDefaultGameState();
        const merged = deepMerge(def, saved);

        if (!Array.isArray(merged.openRooms)) merged.openRooms = def.openRooms.slice();
        if (!merged.currentRoom || !rooms[merged.currentRoom]) merged.currentRoom = def.currentRoom;

        gameState = merged;

        changeRoom(gameState.currentRoom);
        updateInventoryDisplay?.();
        renderNavigation?.();
        updateMessage(`セーブ${slotIndex + 1}をロードしました！`);
      }

      function getSaveSlotLabel(slotIndex) {
        const raw = localStorage.getItem(SAVE_KEYS[slotIndex]);
        if (!raw) {
          return `セーブ${slotIndex + 1}（空）`;
        }
        try {
          const parsed = JSON.parse(raw);
          const savedAt = parsed.savedAt;
          if (!savedAt) {
            return `セーブ${slotIndex + 1}（日時不明）`;
          }
          const d = new Date(savedAt);
          const jp = d.toLocaleString("ja-JP");
          return `セーブ${slotIndex + 1}（${jp}）`;
        } catch {
          return `セーブ${slotIndex + 1}（読み込みエラー）`;
        }
      }

      function openLoadMenu() {
        const buttons = [
          {
            text: getSaveSlotLabel(0),
            action: () => {
              loadGameFromSlot(0);
              closeModal();
            },
          },
          {
            text: getSaveSlotLabel(1),
            action: () => {
              loadGameFromSlot(1);
              closeModal();
            },
          },
          { text: "やめる", action: "close" },
        ];

        showModal("ロードするデータを選んでください", "", buttons, null, { columnButtons: true });
      }

      function saveGame() {
        const buttons = [
          {
            text: getSaveSlotLabel(0) + " に上書き保存",
            action: () => {
              saveGameToSlot(0);
              closeModal();
            },
          },
          {
            text: getSaveSlotLabel(1) + " に上書き保存",
            action: () => {
              saveGameToSlot(1);
              closeModal();
            },
          },
          { text: "やめる", action: "close" },
        ];

        showModal("セーブ先を選んでください", "", buttons, null, { columnButtons: true });
      }

      function loadGame() {
        openLoadMenu();
      }

      function deepMerge(target, source) {
        if (source === undefined || source === null) return target;
        if (Array.isArray(source)) return source.slice();
        if (typeof source === "object") {
          const out = target && typeof target === "object" ? { ...target } : {};
          for (const k of Object.keys(source)) {
            out[k] = deepMerge(target ? target[k] : undefined, source[k]);
          }
          return out;
        }
        return source;
      }

      function showToast(text, ms = 2600) {
        const el = document.getElementById("toast");
        if (!el) return;
        el.textContent = text;
        el.style.opacity = "1";
        el.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateX(-50%) translateY(-8px)";
        }, ms);
      }

      window.addEventListener("resize", () => renderNavigation());

      // window.addEventListener('keydown', e => {
      //     if (e.key === 'F2') {
      //         DEV_MODE = !DEV_MODE;
      //         renderCanvasRoom();
      //     }
      // });

      // ゲーム開始
      preloadImages();
      initGame();
    </script>
    <div
      id="toast"
      style="
        position: fixed;
        left: 50%;
        top: 14px;
        transform: translateX(-50%);
        padding: 10px 14px;
        border-radius: 8px;
        background: #1f6feb;
        color: #fff;
        font-weight: 700;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s,
          transform 0.25s;
        z-index: 9999;
      "
    ></div>
  </body>
